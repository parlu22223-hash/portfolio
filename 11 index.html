<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nozomu Ando Portfolio</title>
    
    <!-- 必須ライブラリ（CDN） -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'dark-bg': '#0d0d0d', 
                        'neon-purple': '#bc13fe', 
                        'neon-lime': '#ccff00' 
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0d0d0d; color: white; margin: 0; overflow-x: hidden; }
        .bg-glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* スクロールバー */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #bc13fe; border-radius: 10px; }

        /* シンプルなフェードイン */
        .fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 埋め込みSVGアイコン
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                Mail: <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7m18-5H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2Z"/>,
                Instagram: <g><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></g>,
                Twitter: <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/>,
                Youtube: <g><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33 2.78 2.78 0 0 0 1.94 2C5.12 20 12 20 12 20s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.33 29 29 0 0 0-.46-5.33z"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"/></g>,
                ChevronDown: <path d="m6 9 6 6 6-6"/>,
                ExternalLink: <g><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 22 3 22 10"/><line x1="10" x2="22" y1="14" y2="3"/></g>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const IMAGES = {
            profile: "https://lh3.googleusercontent.com/d/1OJozgJNwVs3NIU3_Br-GrTP1RQFvyAoR",
            agave: "https://lh3.googleusercontent.com/d/1Lu178a8NZxA5_ojyP6uMPCzGNj4G9v_T",
            work1: "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=800",
            work2: "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800",
            work3: "https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=800",
            work4: "https://images.unsplash.com/photo-1542744094-24638eff58bb?q=80&w=800"
        };

        const LINKS = {
            twitter: "https://x.com/muteki_mx?s=21&t=X60ahBWxOGPo03khxNlrsg",
            instagram: "https://www.instagram.com/h1deandseek_?igsh=MWYzY3Q3NXcwbXZxNg%3D%3D&utm_source=qr",
            line: "https://line.me/ti/p/P7obmsVY_s",
            youtube: "https://www.youtube.com/@h1deandseek_",
            portfolio: "https://fori.io/parlu22223"
        };

        const WORKS = [
            { id: 1, title: "YouTube Entertainment", category: "Video Editing", image: IMAGES.work1, color: "purple", description: "エンタメ系動画のカット・テロップ・演出。" },
            { id: 2, title: "Shorts / TikTok", category: "Short Form", image: IMAGES.work2, color: "lime", description: "テンポ重視の縦型動画編集。" },
            { id: 3, title: "Vlog / Lifestyle", category: "Video Editing", image: IMAGES.work3, color: "purple", description: "空気感を大切にしたシネマティックな編集。" },
            { id: 4, title: "Thumbnail Design", category: "Design", image: IMAGES.work4, color: "lime", description: "クリック率を意識したインパクトのあるサムネイル。" }
        ];

        const SERVICES = [
            { name: "YouTube動画編集", price: "¥15,000〜", detail: "カット、テロップ、BGM、SE込み" },
            { name: "ショート動画制作", price: "¥5,000〜", detail: "TikTok, Reels, Shorts向け縦型動画" },
            { name: "サムネイル制作", price: "¥3,000〜", detail: "動画の顔となるクリックされるデザイン" }
        ];

        function App() {
            return (
                <div className="min-h-screen bg-dark-bg text-white selection:bg-neon-purple font-sans">
                    {/* Hero Section */}
                    <section className="relative h-screen flex flex-col justify-center px-6 md:px-20 overflow-hidden">
                        <div className="z-10 max-w-6xl fade-in-up">
                            <div className="flex items-center gap-4 mb-12">
                                <p className="text-neon-lime font-mono tracking-[0.3em] uppercase text-sm">Freelance Video Editor</p>
                            </div>

                            <div className="flex flex-col md:flex-row md:items-end gap-8 mb-12">
                                <h1 className="text-7xl md:text-[11rem] font-display font-black tracking-tighter leading-[0.8] order-2 md:order-1">
                                    NOZOMU <br />
                                    <span className="text-neon-purple">ANDO</span>
                                </h1>
                                {/* 画像の角度を真っ直ぐに修正 */}
                                <div className="w-48 h-48 md:w-64 md:h-64 rounded-3xl overflow-hidden border-2 border-white/10 order-1 md:order-2 md:mb-4 transition-transform duration-500 hover:scale-105">
                                    <img src={IMAGES.profile} alt="Nozomu Ando" className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700" referrerPolicy="no-referrer" />
                                </div>
                            </div>

                            <p className="text-xl md:text-3xl font-light text-white/60 max-w-xl leading-tight">
                                視聴者の心を掴む編集。<br />YouTube・ショート動画に特化した、<br />テンポとリズムの鋭い映像制作。
                            </p>
                        </div>

                        {/* Background Agave - 位置をプレビューに近づける */}
                        <div className="absolute right-[-5%] top-[15%] w-[65%] opacity-20 pointer-events-none z-0">
                            <img src={IMAGES.agave} alt="" className="w-full h-auto grayscale contrast-125" referrerPolicy="no-referrer" />
                        </div>

                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 text-white/30">
                            <span className="text-[10px] uppercase tracking-widest">Scroll</span>
                            <Icon name="ChevronDown" size={20} />
                        </div>
                    </section>

                    {/* About Section */}
                    <section className="py-32 px-6 max-w-7xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-20 items-center">
                            <div>
                                <h2 className="text-4xl font-display font-bold mb-8 flex items-center gap-4 uppercase">
                                    <span className="w-12 h-[1px] bg-neon-purple"></span>ABOUT
                                </h2>
                                <p className="text-lg text-white/70 leading-relaxed mb-8">
                                    安藤望夢（あんどう のぞむ）。仙台を拠点にフリーランスの動画編集者として活動中。<br />
                                    YouTube動画やショート動画の編集に特化し、視聴者の目を引くテロップ演出やテンポの良いカットを得意としています。<br />
                                    Adobe Premiere Proをメインに使用し、高品質な動画を迅速にお届けします。
                                </p>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="flex flex-col gap-2">
                                        <span className="text-neon-lime text-xs font-mono uppercase tracking-widest">Style</span>
                                        <span className="text-xl font-semibold">Rising Talent</span>
                                    </div>
                                    <div className="flex flex-col gap-2">
                                        <span className="text-neon-purple text-xs font-mono uppercase tracking-widest">Quality</span>
                                        <span className="text-xl font-semibold">Focus on Detail</span>
                                    </div>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="aspect-square rounded-3xl overflow-hidden border-2 border-white/10 group">
                                    <img src={IMAGES.profile} alt="Nozomu Ando" className="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700" referrerPolicy="no-referrer" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Works Section */}
                    <section className="py-32 px-6 bg-white/[0.02]">
                        <div className="max-w-7xl mx-auto">
                            <div className="flex justify-between items-end mb-16">
                                <h2 className="text-5xl md:text-7xl font-display font-black uppercase">SELECTED <br /><span className="text-neon-purple">WORKS</span></h2>
                            </div>
                            <div className="grid md:grid-cols-2 gap-8">
                                {WORKS.map((work) => (
                                    <a key={work.id} href={LINKS.portfolio} target="_blank" rel="noopener noreferrer" className="group relative aspect-[4/3] overflow-hidden rounded-3xl bg-black cursor-pointer block">
                                        <img src={work.image} alt={work.title} className="w-full h-full object-cover opacity-60 group-hover:opacity-40 group-hover:scale-110 transition-all duration-700" />
                                        <div className={`absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none ${work.color === 'purple' ? 'shadow-[inset_0_0_100px_rgba(188,19,254,0.3)]' : 'shadow-[inset_0_0_100px_rgba(204,255,0,0.3)]'}`} />
                                        <div className="absolute inset-0 p-10 flex flex-col justify-end translate-y-8 group-hover:translate-y-0 transition-transform duration-500">
                                            <span className={`text-xs font-mono uppercase tracking-[0.2em] mb-2 ${work.color === 'purple' ? 'text-neon-purple' : 'text-neon-lime'}`}>{work.category}</span>
                                            <h3 className="text-3xl font-bold mb-4">{work.title}</h3>
                                            <p className="text-white/0 group-hover:text-white/70 transition-colors duration-500 max-w-sm">{work.description}</p>
                                            <div className="mt-6 flex items-center gap-2 text-sm font-semibold opacity-0 group-hover:opacity-100 transition-opacity delay-100">
                                                View Project <Icon name="ExternalLink" size={14} />
                                            </div>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section className="py-32 px-6 max-w-5xl mx-auto relative">
                        <div className="absolute left-[-20%] top-0 w-64 h-64 opacity-10 rotate-[-45deg] pointer-events-none">
                            <img src={IMAGES.agave} alt="" className="w-full h-full object-contain grayscale" referrerPolicy="no-referrer" />
                        </div>
                        <h2 className="text-4xl font-display font-bold mb-16 text-center uppercase">SERVICES & <span className="text-neon-lime">PRICE</span></h2>
                        <div className="space-y-4">
                            {SERVICES.map((service, i) => (
                                <div key={i} className="group flex flex-col md:flex-row md:items-center justify-between p-8 rounded-2xl bg-glass hover:bg-white/10 transition-all border-l-4 border-transparent hover:border-neon-lime">
                                    <div className="mb-4 md:mb-0">
                                        <h3 className="text-xl font-bold mb-1">{service.name}</h3>
                                        <p className="text-white/50 text-sm">{service.detail}</p>
                                    </div>
                                    <div className="text-2xl font-display font-black text-neon-lime">{service.price}</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section className="py-32 px-6 bg-neon-purple/5">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-5xl md:text-7xl font-display font-black mb-12 uppercase">LET'S CREATE <br /><span className="text-neon-lime">TOGETHER</span></h2>
                            <div className="flex flex-wrap justify-center gap-6 mb-16">
                                <a href="mailto:parlu22223@gmail.com" className="flex items-center gap-2 bg-white text-black px-8 py-4 rounded-full font-bold hover:bg-neon-lime transition-colors">
                                    <Icon name="Mail" size={20} /> お問い合わせ
                                </a>
                                <div className="flex items-center gap-4">
                                    <a href={LINKS.instagram} target="_blank" rel="noopener noreferrer" className="p-4 rounded-full bg-glass hover:text-neon-purple transition-colors"><Icon name="Instagram" size={24} /></a>
                                    <a href={LINKS.twitter} target="_blank" rel="noopener noreferrer" className="p-4 rounded-full bg-glass hover:text-neon-lime transition-colors"><Icon name="Twitter" size={24} /></a>
                                    <a href={LINKS.youtube} target="_blank" rel="noopener noreferrer" className="p-4 rounded-full bg-glass hover:text-red-500 transition-colors"><Icon name="Youtube" size={24} /></a>
                                    <a href={LINKS.line} target="_blank" rel="noopener noreferrer" className="p-4 rounded-full bg-glass hover:text-neon-lime transition-colors flex items-center gap-2 font-bold"><span className="text-sm">LINE</span></a>
                                </div>
                            </div>
                            <div className="pt-16 border-t border-white/10 flex flex-col md:flex-row justify-between items-center gap-6 text-white/30 text-xs font-mono uppercase tracking-widest">
                                <span>© 2024 NOZOMU ANDO</span>
                                <span>Based in Sendai, Japan</span>
                                <span>All Rights Reserved</span>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
